# Job A — validate all dflow.template.json against JSON Schema + registry (Phase B CI)
# https://app.clickup.com/t/86d2nff0v
name: Validate manifests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: validate-manifests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run validate:manifests

      - run: pnpm run validate:manifests:self-test

      - run: pnpm run check:registry
