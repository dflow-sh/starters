# Job B — install + build + optional HTTP smoke per Phase 1 starter (manifest healthCheck)
# https://app.clickup.com/t/86d2nff0v — matrix: epic Phase 1 starters
# https://app.clickup.com/t/86d2nfce8
# Phase D expansion: https://app.clickup.com/t/86d2nfe4g
name: Starter matrix (Phase 1)

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: starter-matrix-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: temurin
  GO_VERSION: "1.22"

jobs:
  build:
    name: ${{ matrix.id }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: frontend/react-vite
            path: starters/frontend/react-vite
            runtime: node
            npm_key_file: starters/frontend/react-vite/package.json
            install_command: npm install
            build_command: npm run build
            smoke_port: "4173"
            smoke_path: /
          # https://app.clickup.com/t/86d2nff5w
          - id: frontend/vue-vite
            path: starters/frontend/vue-vite
            runtime: node
            npm_key_file: starters/frontend/vue-vite/package.json
            install_command: npm install
            build_command: npm run build
            smoke_port: "4173"
            smoke_path: /
          # https://app.clickup.com/t/86d2nff5x
          - id: frontend/angular
            path: starters/frontend/angular
            runtime: node
            npm_key_file: starters/frontend/angular/package.json
            install_command: npm ci
            build_command: npm run build
            smoke_port: "4173"
            smoke_path: /
            node_smoke_cmd: "npx serve dist/angular/browser -l tcp://127.0.0.1:$SMOKE_PORT"
          - id: backend/python-fastapi
            path: starters/backend/python-fastapi
            runtime: python
            install_command: python3 -m pip install -r requirements.txt
            build_command: ""
            smoke_port: "8000"
            smoke_path: /health
          # https://app.clickup.com/t/86d2nff20
          - id: backend/java-springboot
            path: starters/backend/java-springboot
            runtime: java
            install_command: ./mvnw -B -q dependency:resolve
            build_command: ./mvnw -B -q package -DskipTests
            smoke_port: "8080"
            smoke_path: /health
          # https://app.clickup.com/t/86d2nff5u
          - id: backend/go-gin
            path: starters/backend/go-gin
            runtime: go
            install_command: go mod download
            build_command: go build -o bin/server .
            smoke_port: "8080"
            smoke_path: /health
          # https://app.clickup.com/t/86d2nff5v
          - id: backend/node-express
            path: starters/backend/node-express
            runtime: node
            npm_key_file: starters/backend/node-express/package.json
            install_command: npm install
            build_command: ""
            smoke_port: "8080"
            smoke_path: /health
            node_smoke_cmd: "npm start"
          # https://app.clickup.com/t/86d2nff5y
          - id: fullstack/nextjs
            path: starters/fullstack/nextjs
            runtime: node
            npm_key_file: starters/fullstack/nextjs/package.json
            install_command: npm install
            build_command: npm run build
            smoke_port: "3000"
            smoke_path: /api/health
            node_smoke_cmd: "npm run start"
            next_telemetry_disabled: "1"

    defaults:
      run:
        working-directory: ${{ matrix.path }}
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules (npm)
        if: matrix.runtime == 'node'
        uses: actions/cache@v4
        with:
          path: ${{ matrix.path }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.id }}-${{ hashFiles(matrix.npm_key_file) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.id }}-

      - name: Cache Angular CLI cache
        if: matrix.id == 'frontend/angular'
        uses: actions/cache@v4
        with:
          path: ${{ matrix.path }}/.angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('starters/frontend/angular/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-angular-

      - name: Set up Python
        if: matrix.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ matrix.path }}/requirements.txt

      - name: Set up Java
        if: matrix.runtime == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Go
        if: matrix.runtime == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.path }}/go.sum

      - name: Install (Node)
        if: matrix.runtime == 'node'
        run: ${{ matrix.install_command }}

      - name: Install (Python)
        if: matrix.runtime == 'python'
        run: ${{ matrix.install_command }}

      - name: Verify (Python import)
        if: matrix.runtime == 'python'
        run: python3 -c "import main; assert getattr(main, 'app', None) is not None"

      - name: Install (Java)
        if: matrix.runtime == 'java'
        run: |
          chmod +x mvnw
          ${{ matrix.install_command }}

      - name: Install (Go)
        if: matrix.runtime == 'go'
        env:
          CGO_ENABLED: "0"
        run: ${{ matrix.install_command }}

      - name: Test and vet (Go)
        if: matrix.runtime == 'go'
        env:
          CGO_ENABLED: "0"
        run: |
          go test ./...
          go vet ./...

      - name: Build
        if: matrix.build_command != ''
        env:
          NEXT_TELEMETRY_DISABLED: ${{ matrix.next_telemetry_disabled }}
        run: ${{ matrix.build_command }}

      - name: Smoke (healthCheck)
        env:
          SMOKE_PORT: ${{ matrix.smoke_port }}
          SMOKE_PATH: ${{ matrix.smoke_path }}
        run: |
          set -euo pipefail
          case "${{ matrix.runtime }}" in
            node)
              if [ -n "${{ matrix.node_smoke_cmd }}" ]; then
                ${{ matrix.node_smoke_cmd }} &
              else
                npm run preview -- --host 127.0.0.1 --port "${SMOKE_PORT}" &
              fi
              pid=$!
              ;;
            python)
              python3 -m uvicorn main:app --host 127.0.0.1 --port "${SMOKE_PORT}" &
              pid=$!
              ;;
            java)
              java -jar target/app.jar &
              pid=$!
              ;;
            go)
              CGO_ENABLED=0 ./bin/server &
              pid=$!
              ;;
            *)
              echo "::error::Unknown runtime: ${{ matrix.runtime }}"
              exit 1
              ;;
          esac
          cleanup() {
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          deadline=$((SECONDS + 90))
          ok=
          while [ $SECONDS -lt $deadline ]; do
            if curl -sf -o /dev/null "http://127.0.0.1:${SMOKE_PORT}${SMOKE_PATH}"; then
              ok=1
              break
            fi
            sleep 1
          done
          if [ -z "${ok:-}" ]; then
            echo "::error::Health check failed: http://127.0.0.1:${SMOKE_PORT}${SMOKE_PATH}"
            exit 1
          fi
